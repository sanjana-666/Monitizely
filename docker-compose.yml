services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: monetizely
      POSTGRES_PASSWORD: monetizely
      POSTGRES_DB: monetizely
    ports:
      - "5432:5432"
    volumes:
      - monetizely-postgres-data:/var/lib/postgresql/data

volumes:
  monetizely-postgres-data:
